<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>项目关系画布</title>
<style>
:root{color-scheme:dark;--bg:#08111f;--panel:#101d31;--line:#38506d;--text:#e7eef8;--muted:#93a8c1;--accent:#43c7ff;--warn:#ffc857;--danger:#ff6b7a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px Inter,system-ui,sans-serif;overflow:hidden}header{height:72px;padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px}h1{font-size:20px;margin:0}.controls{display:flex;gap:8px;align-items:center;flex:1}button,input,select{background:#0a1628;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:7px 10px}button{cursor:pointer}button:hover{border-color:var(--accent)}#notice{color:var(--warn)}main{height:calc(100vh - 72px);display:grid;grid-template-columns:minmax(500px,2fr) minmax(360px,1fr);gap:10px;padding:10px}.panel{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}#canvas{width:100%;height:100%;display:block;background:radial-gradient(circle at 20% 10%,#142b47,#08111f 65%)}.edge{stroke:#607d9e;stroke-width:2;fill:none;opacity:.7;marker-end:url(#arrow)}.edge.relation{stroke:#43c7ff;stroke-dasharray:6 4}.edge.highlighted{stroke:#ffc857;stroke-width:4;opacity:1}.graph-node{cursor:pointer}.graph-node rect{fill:#14243b;stroke:#52708f;stroke-width:2;rx:9}.graph-node:hover rect,.graph-node.active rect{stroke:#43c7ff;stroke-width:3}.graph-node.dimmed{opacity:.14}.graph-node text{fill:#e7eef8;pointer-events:none}.node-type{fill:#93a8c1!important;font-size:11px}.edge-label{fill:#93a8c1;font-size:10px;pointer-events:none}.toolbar{position:absolute;left:12px;top:12px;z-index:2;display:flex;gap:6px}.legend{position:absolute;left:12px;bottom:12px;color:var(--muted);background:#08111fdd;padding:8px;border-radius:7px}.minimap-wrap{position:absolute;right:12px;bottom:12px;width:180px;height:110px;background:#08111fe8;border:1px solid var(--line);border-radius:8px}.minimap{width:100%;height:100%}.minimap circle{fill:#43c7ff}.detail{height:100%;overflow:auto;padding:20px}.detail h2{margin-top:0}.doc-meta{color:var(--muted);display:grid;grid-template-columns:auto 1fr;gap:4px 10px}.doc-error{border:1px solid var(--danger);color:#ffd6db;padding:12px;border-radius:8px}.toc{border-left:2px solid var(--line);padding-left:12px;margin:14px 0}.toc a{display:block;color:#8bdcff;text-decoration:none;margin:4px 0}.document-body{line-height:1.65}.document-body pre{background:#07101d;padding:12px;border-radius:7px;overflow:auto}.document-body code{background:#07101d;padding:2px 5px;border-radius:4px}.document-body table{border-collapse:collapse;width:100%}.document-body th,.document-body td{border:1px solid var(--line);padding:6px}.document-body a{color:#8bdcff}.document-body a[data-blocked-link]{color:var(--danger);pointer-events:none}.source-link{color:#8bdcff}@media(max-width:900px){body{overflow:auto}main{height:auto;grid-template-columns:1fr}.panel{min-height:70vh}}
</style>
</head>
<body data-view-state="__VIEW_STATE__">
<header><h1>项目关系画布</h1><div class="controls"><input id="query" aria-label="筛选节点" placeholder="按 ID 或标题筛选"><select id="status" aria-label="筛选状态"><option value="">全部状态</option></select><button id="zoom-in" aria-label="放大">＋</button><button id="zoom-out" aria-label="缩小">－</button><button id="fit" aria-label="适配画布">适配</button></div><div id="notice" role="status"></div></header>
<main><section class="panel" id="canvas-panel"><div class="toolbar"><span id="selection">点击节点查看衍生路径与正文</span></div><svg id="canvas" viewBox="0 0 1200 700" aria-label="文档关系图"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#607d9e"/></marker></defs><g id="viewport"><g id="edges"></g><g id="edge-labels"></g><g id="graph-nodes"></g></g></svg><div class="legend">实线：结构父级　虚线：文档关系</div><div class="minimap-wrap"><svg id="minimap" class="minimap" aria-label="小地图"></svg></div></section><aside class="panel"><article class="detail" id="document-detail"><h2>文档正文</h2><p>请选择画布节点。</p></article></aside></main>
<script id="view-data" type="application/json">__VIEW_DATA__</script>
<script>
const data=JSON.parse(document.getElementById('view-data').textContent),graph=data.graph,documents=data.documents,state=document.body.dataset.viewState,svg=document.getElementById('canvas'),viewport=document.getElementById('viewport'),nodesLayer=document.getElementById('graph-nodes'),edgesLayer=document.getElementById('edges'),labelsLayer=document.getElementById('edge-labels'),detail=document.getElementById('document-detail'),notice=document.getElementById('notice'),query=document.getElementById('query'),status=document.getElementById('status'),selection=document.getElementById('selection'),minimap=document.getElementById('minimap');
const messages={empty:'当前没有可显示的图谱节点。','stale-index':'索引已过期，请重建。','missing-detail':'部分关系指向缺失文档。','invalid-source':'图谱源无效，无法显示。'};notice.textContent=messages[state]||'';
[...new Set(graph.nodes.map(n=>n.status).filter(Boolean))].sort().forEach(v=>status.add(new Option(v,v)));
const byId=new Map(graph.nodes.map(n=>[n.id,n])),parents=new Map(graph.structural_edges.map(e=>[e.source,e.target]));
function depth(id,seen=new Set()){if(seen.has(id)||!parents.has(id))return 0;seen.add(id);return 1+depth(parents.get(id),seen)}
const columns=new Map();graph.nodes.slice().sort((a,b)=>a.id.localeCompare(b.id)).forEach(n=>{const d=depth(n.id);if(!columns.has(d))columns.set(d,[]);columns.get(d).push(n)});
const pos=new Map();columns.forEach((items,d)=>items.forEach((n,i)=>pos.set(n.id,{x:80+d*270,y:80+i*120})));
const allEdges=[...graph.structural_edges.map(e=>({...e,kind:'structural'})),...graph.relation_edges.map(e=>({...e,kind:'relation'}))];
allEdges.forEach((e,i)=>{const a=pos.get(e.source),b=pos.get(e.target);if(!a||!b)return;const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',`M${a.x},${a.y+25} C${(a.x+b.x)/2},${a.y+25} ${(a.x+b.x)/2},${b.y+25} ${b.x+180},${b.y+25}`);path.setAttribute('class',`edge ${e.kind==='relation'?'relation':''}`);path.dataset.source=e.source;path.dataset.target=e.target;edgesLayer.appendChild(path);const label=document.createElementNS('http://www.w3.org/2000/svg','text');label.setAttribute('x',(a.x+b.x+180)/2);label.setAttribute('y',(a.y+b.y)/2+18);label.setAttribute('class','edge-label');label.textContent=e.type;labelsLayer.appendChild(label)});
graph.nodes.forEach(n=>{const p=pos.get(n.id),g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('class','graph-node');g.dataset.id=n.id;g.setAttribute('transform',`translate(${p.x},${p.y})`);g.innerHTML=`<rect width="180" height="58"></rect><text x="10" y="23">${escapeText(n.title||n.id).slice(0,24)}</text><text class="node-type" x="10" y="43">${escapeText(n.document_type||n.node_type||'document')} · ${escapeText(n.status||'')}</text>`;g.addEventListener('click',()=>show(n));nodesLayer.appendChild(g)});
function escapeText(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function show(n){document.querySelectorAll('.graph-node').forEach(x=>x.classList.toggle('active',x.dataset.id===n.id));document.querySelectorAll('.edge').forEach(x=>x.classList.toggle('highlighted',x.dataset.source===n.id||x.dataset.target===n.id));selection.textContent=n.id+' 的直接衍生路径';const doc=documents[n.id];if(!doc||doc.status!=='ready'){detail.innerHTML=`<h2>${escapeText(n.title||n.id)}</h2><div class="doc-error" data-document-status="${escapeText(doc?.status||'missing')}">${escapeText(doc?.message||'正文缺失')}</div>`;return}const toc=doc.toc.map(h=>`<a href="#${encodeURIComponent(h.anchor)}" style="margin-left:${(Number(h.level)-1)*8}px">${escapeText(h.title)}</a>`).join('');detail.innerHTML=`<h2>${escapeText(n.title||n.id)}</h2><dl class="doc-meta"><dt>ID</dt><dd>${escapeText(n.id)}</dd><dt>摘要</dt><dd data-source-digest>${escapeText(doc.source_digest)}</dd></dl><nav class="toc" aria-label="标题导航">${toc}</nav><div class="document-body">${doc.rendered_html}</div><p><a class="source-link" href="${encodeURI(doc.source_path||n.source_path)}">源文件（辅助编辑）</a></p>`}
let scale=1,tx=0,ty=0,drag=false,last={x:0,y:0};function apply(){viewport.setAttribute('transform',`translate(${tx} ${ty}) scale(${scale})`)}function zoom(f,cx=svg.clientWidth/2,cy=svg.clientHeight/2){const old=scale;scale=Math.max(.25,Math.min(2.5,scale*f));tx=cx-(cx-tx)*scale/old;ty=cy-(cy-ty)*scale/old;apply()}document.getElementById('zoom-in').onclick=()=>zoom(1.2);document.getElementById('zoom-out').onclick=()=>zoom(.8);document.getElementById('fit').onclick=()=>{scale=.75;tx=10;ty=10;apply()};svg.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.1:.9,e.offsetX,e.offsetY)},{passive:false});svg.addEventListener('pointerdown',e=>{if(e.target.closest('.graph-node'))return;drag=true;last={x:e.clientX,y:e.clientY};svg.setPointerCapture(e.pointerId)});svg.addEventListener('pointermove',e=>{if(!drag)return;tx+=e.clientX-last.x;ty+=e.clientY-last.y;last={x:e.clientX,y:e.clientY};apply()});svg.addEventListener('pointerup',()=>drag=false);svg.addEventListener('pointercancel',()=>drag=false);
function filter(){const q=query.value.toLowerCase(),s=status.value;document.querySelectorAll('.graph-node').forEach(g=>{const n=byId.get(g.dataset.id),visible=(!s||n.status===s)&&(!q||n.id.toLowerCase().includes(q)||String(n.title||'').toLowerCase().includes(q));g.classList.toggle('dimmed',!visible)})}query.oninput=filter;status.onchange=filter;
minimap.setAttribute('viewBox','0 0 1200 700');pos.forEach((p,id)=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',p.x+90);c.setAttribute('cy',p.y+29);c.setAttribute('r','7');c.dataset.id=id;minimap.appendChild(c)});apply();
</script>
</body></html>
